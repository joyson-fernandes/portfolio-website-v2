apiVersion: v1
kind: Namespace
metadata:
  name: portfolio
  labels:
    app: portfolio
    team: personal
    env: production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-app
  namespace: portfolio
  labels:
    app: portfolio-app
    team: personal
    env: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-app
  template:
    metadata:
      labels:
        app: portfolio-app
        team: personal
        env: production
    spec:
      containers:
      - name: portfolio-app
        image: registry.joysontech.com/library/portfolio-app:84191fe
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-app
  namespace: portfolio
  labels:
    app: portfolio-app
spec:
  type: LoadBalancer
  selector:
    app: portfolio-app
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
