apiVersion: v1
kind: Namespace
metadata:
  name: portfolio
  labels:
    app: portfolio
    team: personal
    env: production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-app
  namespace: portfolio
  labels:
    app: portfolio-app
    team: personal
    env: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-app
  template:
    metadata:
      labels:
        app: portfolio-app
        team: personal
        env: production
    spec:
      containers:
      - name: portfolio-app
        image: registry.joysontech.com/library/portfolio-app:578b322
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-app
  namespace: portfolio
  labels:
    app: portfolio-app
spec:
  type: ClusterIP
  selector:
    app: portfolio-app
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: joysonfernandes-com
  namespace: portfolio
spec:
  secretName: joysonfernandes-com-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - joysonfernandes.com
    - www.joysonfernandes.com
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: portfolio
  namespace: portfolio
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`joysonfernandes.com`) || Host(`www.joysonfernandes.com`)
      services:
        - name: portfolio-app
          port: 80
  tls:
    secretName: joysonfernandes-com-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: portfolio-redirect
  namespace: portfolio
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`joysonfernandes.com`) || Host(`www.joysonfernandes.com`)
      middlewares:
        - name: redirect-https
      services:
        - name: portfolio-app
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: portfolio
spec:
  redirectScheme:
    scheme: https
    permanent: true
