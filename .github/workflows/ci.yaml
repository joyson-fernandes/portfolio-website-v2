name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Preview: runs on PRs — builds image and starts a preview container on the runner
  preview:
    runs-on: self-hosted
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${{ secrets.HARBOR_REGISTRY }} -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin

      - name: Build preview image
        run: |
          TAG="pr-${{ github.event.number }}"
          REGISTRY="${{ secrets.HARBOR_REGISTRY }}/library"

          for attempt in 1 2 3; do
            docker build --network=host -t $REGISTRY/portfolio-app:$TAG ./app && break
            echo "Build failed (attempt $attempt/3), retrying..."
            sleep 5
          done

          # Scan
          if command -v trivy &> /dev/null; then
            trivy image --exit-code 1 --severity CRITICAL,HIGH --no-progress $REGISTRY/portfolio-app:$TAG || true
          fi

          docker push $REGISTRY/portfolio-app:$TAG

      - name: Deploy preview container
        run: |
          TAG="pr-${{ github.event.number }}"
          CONTAINER="portfolio-preview-${{ github.event.number }}"
          REGISTRY="${{ secrets.HARBOR_REGISTRY }}/library"
          PREVIEW_PORT=$((4000 + ${{ github.event.number }}))

          # Stop existing preview if running
          docker rm -f $CONTAINER 2>/dev/null || true

          # Run preview container
          docker run -d \
            --name $CONTAINER \
            -p $PREVIEW_PORT:3000 \
            -e PORT=3000 \
            -e NODE_ENV=production \
            --restart unless-stopped \
            $REGISTRY/portfolio-app:$TAG

          echo "## 🔍 Preview Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Preview is running at: **http://10.0.1.40:${PREVIEW_PORT}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Container: \`$CONTAINER\` | Image: \`portfolio-app:$TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Preview will be cleaned up when the PR is merged or closed._" >> $GITHUB_STEP_SUMMARY

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const port = 4000 + ${{ github.event.number }};
            const body = `### 🔍 Preview Deployed\n\nPreview is running at: **http://10.0.1.40:${port}**\n\n_Updated at ${new Date().toISOString()}_`;

            // Find existing preview comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.number }},
            });
            const existing = comments.data.find(c => c.body.includes('Preview Deployed'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ github.event.number }},
                body,
              });
            }

  # Cleanup: runs when PR is merged or closed
  preview-cleanup:
    runs-on: self-hosted
    if: github.event_name == 'pull_request' && (github.event.action == 'closed')
    steps:
      - name: Stop preview container
        run: |
          CONTAINER="portfolio-preview-${{ github.event.number }}"
          docker rm -f $CONTAINER 2>/dev/null || true
          echo "Cleaned up preview container: $CONTAINER"

  # Production: runs on push to main
  build-and-deploy:
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${{ secrets.HARBOR_REGISTRY }} -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin

      - name: Build and push
        run: |
          TAG=$(git rev-parse --short HEAD)
          REGISTRY="${{ secrets.HARBOR_REGISTRY }}/library"

          # Build with retry (npm can ECONNRESET on large installs)
          for attempt in 1 2 3; do
            docker build --network=host -t $REGISTRY/portfolio-app:$TAG -t $REGISTRY/portfolio-app:latest ./app && break
            echo "Build failed (attempt $attempt/3), retrying..."
            sleep 5
          done

          # Scan
          if command -v trivy &> /dev/null; then
            trivy image --exit-code 1 --severity CRITICAL,HIGH --no-progress $REGISTRY/portfolio-app:$TAG || true
          fi

          docker push $REGISTRY/portfolio-app:$TAG
          docker push $REGISTRY/portfolio-app:latest
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      - name: Deploy to Kubernetes
        run: |
          export PATH=$PATH:/usr/local/bin
          sed -i "s|image: registry.joysontech.com/library/portfolio-app:.*|image: registry.joysontech.com/library/portfolio-app:$IMAGE_TAG|" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl rollout status deployment/portfolio-app -n portfolio --timeout=120s
          echo "Deployed portfolio-app:$IMAGE_TAG"
